<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Painel Administrativo - Instituto de Desenvolvimento do Sertão</title>
  <meta name="description" content="O Instituto de Desenvolvimento do Sertão (IDS) promove o desenvolvimento social, cultural, e educacional do sertão brasileiro. Conheça nossos projetos e iniciativas que transformam comunidades locais. Junte-se a nós para construir um futuro mais próspero e inclusivo!">
  <meta name="keywords" content="desenvolvimento social, educação, cultura, Instituto de Desenvolvimento do Sertão, sertão brasileiro">

  <!-- Favicons -->
  <link href="/assets/img/favicon.png" type="image/x-icon" rel="icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="/assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="/assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <link href="/assets/css/main.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/dashboard.css">

  <!-- Supabase Connection -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="d-flex">
  <!-- sidebar -->
  <div class="sidebar p-3 text-white" style="width: 280px;">
    <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
      <img src="/assets/img/favicon.png" class="me-2">
      <span class="fs-4 title">Painel IDS</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a href="/admin/index.html" class="nav-link d-flex align-items-center gap-2 active" aria-current="page">
          <i class="bi bi-newspaper"></i> Notícias
        </a>
      </li>
    </ul>
    <hr>
    <button class="btn btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
  </div>

  <main class="container min-vh-100 d-flex flex-column">
    <!-- toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
          <strong class="me-auto">Aviso</strong>
          <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="mensagem">
          <!-- Js -->
        </div>
      </div>
    </div>
    
    <div class="painel mt-5">
      <div class="header text-light d-flex justify-content-between align-items-center p-2">
        <h5 class="m-0">Painel de Notícias</h5>
        <button class="btn btn-insert text-light" onclick="abrirModalInsert()">
          <i class="bi bi-plus-circle"></i> Nova Notícia
        </button>
      </div>
      <!-- TABELA -->
      <table class="table table-striped table-hover align-middle">
        <thead>
          <tr>
            <th class="painel-titulo">Título</th>
            <th class="painel-subtitulo">Subtítulo</th>
            <th class="painel-descricao">Descrição</th>
            <th class="painel-img">Imagem</th>
            <th class="painel-data">Data</th>
            <th class="text-center painel-acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaNoticias">
          <!-- JS -->
        </tbody>
      </table>
    </div>
  
    <!-- MODAL INSERIR NOTÍCIA -->
    <div class="modal fade" id="modalInsert" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title d-flex align-items-center gap-2" id="tituloModal">
              <div class="modal-icon">
                <i class="bi bi-plus-circle"></i>
              </div>
              Inserir Nova Notícia
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body pb-0">
            <div class="mb-3">
              <label class="form-label">Título da Notícia</label>
              <input type="text" class="form-control" id="tituloInput" placeholder="Digite o título" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subtítulo</label>
              <input type="text" class="form-control" id="subtituloInput" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Texto da Notícia</label>
              <textarea rows="5" class="form-control" id="descricaoInput" placeholder="Digite o conteúdo da notícia"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Data da Notícia</label>
              <input type="date" class="form-control" id="dataInput" required>
            </div>
            <div class="mb-0">
              <label class="form-label">Adicionar Imagem</label>
              <input type="file" class="form-control" id="imagemInput" accept="image/*" required>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary rounded-pill" onclick="salvarNoticia()">Salvar</button>
          </div>

        </div>
      </div>
    </div>
    <!-- MODAL DELETAR NOTÍCIA -->
    <div class="modal fade" id="modalDelete" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">

          <div class="modal-header">
            <h5 class="modal-title d-flex align-items-center gap-2" id="tituloModal">
              <div class="modal-icon">
                <i class="bi bi-trash2"></i>
              </div>
              Excluir Notícia
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body pb-0">
            <p class="text-muted">
              Tem Certeza que Deseja excluir a notícia? Essa ação não pode ser desfeita.
            </p>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-danger rounded-pill" id="btnDeletar">Confirmar</button>
          </div>

        </div>
      </div>
    </div>
    <!-- MODAL EDITAR NOTÍCIA -->
    <div class="modal fade" id="modalEdit" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title d-flex align-items-center gap-2" id="tituloModal">
              <div class="modal-icon">
                <i class="bi bi-pencil-square"></i>
              </div>
              Editar Notícia
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body pb-0">
            <div class="mb-3">
              <label class="form-label">Título da Notícia</label>
              <input type="text" class="form-control" id="editTitulo" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subtítulo</label>
              <input type="text" class="form-control" id="editSubtitulo" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Texto da Notícia</label>
              <textarea rows="5" class="form-control" id="editDescricao"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Data da Notícia</label>
              <input type="date" class="form-control" id="editData" required>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary rounded-pill" id="btnSalvarEdicao">Salvar</button>
          </div>

        </div>
      </div>
    </div>
  </main>
  <!-- JS -->
  <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- Admin -->
  <script src="/admin/admin.js"></script>
</body>
</html>
