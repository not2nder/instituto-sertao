<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - IDS</title>

  <link href="/assets/img/logo-gradient.svg" rel="icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <link href="/assets/css/login.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="p-4 min">
  <main>
    <div class="wave-container">
      <svg width="100%" height="100%" id="svg" viewBox="0 0 1440 490" xmlns="http://www.w3.org/2000/svg" class="transition duration-300 ease-in-out delay-150">
        <defs>
          <linearGradient id="gradient" x1="99%" y1="41%" x2="1%" y2="59%">
            <stop offset="5%" stop-color="#62b957"></stop>
            <stop offset="95%" stop-color="#a7d6a1"></stop>
          </linearGradient>
        </defs>
        <path d="M 0,500 L 0,125 C 81.53076923076924,142.87692307692308 163.06153846153848,160.75384615384615 239,152 C 314.9384615384615,143.24615384615385 385.28461538461545,107.86153846153849 469,105 C 552.7153846153846,102.13846153846151 649.7999999999998,131.79999999999998 723,144 C 796.2000000000002,156.20000000000002 845.5153846153847,150.93846153846155 915,159 C 984.4846153846153,167.06153846153845 1074.1384615384616,188.44615384615386 1165,185 C 1255.8615384615384,181.55384615384614 1347.9307692307693,153.27692307692308 1440,125 L 1440,500 L 0,500 Z" stroke="none" stroke-width="0" fill="url(#gradient)" fill-opacity="0.53" class="transition-all duration-300 ease-in-out delay-150 path-0" transform="rotate(-180 720 250)"></path>
        <defs>
          <linearGradient id="gradient" x1="99%" y1="41%" x2="1%" y2="59%">
            <stop offset="5%" stop-color="#62b957"></stop>
            <stop offset="95%" stop-color="#a7d6a1"></stop>
          </linearGradient>
        </defs>
        <path d="M 0,500 L 0,291 C 77.06923076923076,293.2769230769231 154.1384615384615,295.55384615384617 233,283 C 311.8615384615385,270.44615384615383 392.5153846153846,243.06153846153842 470,244 C 547.4846153846154,244.93846153846158 621.8000000000001,274.20000000000005 700,299 C 778.1999999999999,323.79999999999995 860.2846153846153,344.1384615384615 944,337 C 1027.7153846153847,329.8615384615385 1113.0615384615385,295.24615384615385 1196,283 C 1278.9384615384615,270.75384615384615 1359.4692307692308,280.87692307692305 1440,291 L 1440,500 L 0,500 Z" stroke="none" stroke-width="0" fill="url(#gradient)" fill-opacity="1" class="transition-all duration-300 ease-in-out delay-150 path-1" transform="rotate(-180 720 250)"></path>
      </svg>
    </div>
    <div class="login-card">
      <!-- LEFT -->
      <div class="login-left">
        <div class="pattern-bg">
          <svg viewBox="0 0 400 400">
            <defs>
              <pattern id="bg_pattern" width="100" height="100" patternUnits="userSpaceOnUse">
                <polygon points="0,0 100,0, 0,100" fill="#77ed78"></polygon>
                <polygon points="100,100 100,0, 0,100" fill="#348c35"></polygon>
              </pattern>
            </defs>
            <rect x="0" y="0" width="100%" height="100%" fill="#efefff"></rect>
            <rect x="0" y="-90" width="100%" height="200%" fill="url(#bg_pattern)"></rect>
          </svg>
        </div>
        <img src="/assets/img/logo.svg" class="logo">
        <h2>Bem-vindo ao IDS</h2>
        <p>Gerencie notícias, conteúdos e atualizações com segurança e praticidade.</p>
        <a href="/"><i class="bi bi-arrow-left"></i> Voltar ao site</a>
      </div>

      <!-- RIGHT -->
      <div class="login-right p-4">
        <h3 class="text-center mb-4">Acessar painel</h3>

        <div class="form-group mb-4">
          <div class="input-group">
            <span class="input-group-text rounded-start-pill">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" id="email" class="form-control rounded-end-pill m-0" placeholder="Digite seu email">
          </div>
        </div>

        <div class="form-group">
          <div class="input-group">
            <span class="input-group-text rounded-start-pill">
              <i class="bi bi-key"></i>
            </span>
            <input type="password" id="senha" class="form-control m-0" placeholder="Digite sua senha">
            <button id="togglePassword" class="input-group-text rounded-end-pill">
              <i id="eyeIcon" class="bi-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-login w-100 rounded-pill mt-2">
          Entrar
        </button>

        <div id="erro" class="text-danger text-center mt-3"></div>
      </div>

    </div>
  </main>
  <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/login/login.js"></script>
</body>
</html>
